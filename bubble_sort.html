<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bubble Sort 視覺化</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
}

#container{
    margin-top:40px;
}

.bar{
    display:inline-block;
    width:40px;
    margin:2px;
    background:#3498db;
    color:white;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:10px;
}
</style>

</head>

<body>

<h1>氣泡排序法 Bubble Sort</h1>

<a href="index.html" style="display: inline-block; padding: 10px 20px; margin: 10px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; font-size: 16px;">← 返回主頁</a>

<input id="numbers" placeholder="例如: 8,3,1,6,2">
<br><br>

<button onclick="startSort()">開始排序</button>

<div id="container"></div>

<script>

let arr=[];

function drawArray(){

    let container=document.getElementById("container");
    container.innerHTML="";

    for(let i=0;i<arr.length;i++){

        let bar=document.createElement("div");
        bar.className="bar";
        bar.style.height=arr[i]*20+"px";
        bar.innerText=arr[i];

        container.appendChild(bar);
    }
}

function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve,ms));
}

async function bubbleSort(){

    let n=arr.length;

    for(let i=0;i<n;i++){

        for(let j=0;j<n-i-1;j++){

            if(arr[j]>arr[j+1]){

                let temp=arr[j];
                arr[j]=arr[j+1];
                arr[j+1]=temp;

                drawArray();

                await sleep(500);
            }

        }
    }

}

async function startSort(){

    let input=document.getElementById("numbers").value;

    arr=input.split(",").map(Number);

    drawArray();

    await bubbleSort();
}

</script>

</body>
</html>
